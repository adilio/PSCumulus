name: Test and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pester tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.6.0 -MaximumVersion 5.99.99 -Force -Scope CurrentUser

      - name: Run tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          Invoke-Pester -Configuration $config

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  publish:
    name: Publish to PowerShell Gallery
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest
        shell: pwsh
        run: |
          $result = Test-ModuleManifest -Path ./PSCumulus.psd1
          Write-Host "Module: $($result.Name) v$($result.Version)"

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_KEY: ${{ secrets.PSGALLERY_KEY }}
        run: |
          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_KEY -Verbose
