site_name: PSCumulus
site_description: Thin cross-cloud PowerShell abstraction for Azure, AWS, and GCP.
site_url: https://adilio.github.io/PSCumulus/
repo_url: https://github.com/adilio/PSCumulus
repo_name: adilio/PSCumulus
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Talk Demo: talk-demo.md
  - Concepts:
      - Strategy: concepts/strategy.md
  - Reference:
      - Overview: reference/index.md
      - About PSCumulus: reference/about-pscumulus.md
      - Module: reference/module.md
      - Commands:
          - Connect-Cloud: reference/commands/Connect-Cloud.md
          - Get-CloudContext: reference/commands/Get-CloudContext.md
          - Get-CloudDisk: reference/commands/Get-CloudDisk.md
          - Get-CloudFunction: reference/commands/Get-CloudFunction.md
          - Get-CloudInstance: reference/commands/Get-CloudInstance.md
          - Get-CloudNetwork: reference/commands/Get-CloudNetwork.md
          - Get-CloudStorage: reference/commands/Get-CloudStorage.md
          - Get-CloudTag: reference/commands/Get-CloudTag.md
          - Start-CloudInstance: reference/commands/Start-CloudInstance.md
          - Stop-CloudInstance: reference/commands/Stop-CloudInstance.md
